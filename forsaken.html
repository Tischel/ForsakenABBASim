<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMU — Forsaken Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Jura:wght@400;600;700&display=swap');
  :root{
    --bg:#0a0710; --panel:#15101f; --panel2:#1d1630;
    --ink:#e9e2f5; --muted:#9a8fb5; --line:#2c2240;
    --gold:#d8b25a; --red:#c44; --blue:#5b7bd6; --green:#6fae54;
    --tankcol:#3c50ae; --healcol:#3c672f; --dpscol:#743333;
    --tower:#5fd0e8; --hit:#e23b3b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:
    radial-gradient(1200px 800px at 50% -10%, #1a1330 0%, var(--bg) 60%);
    color:var(--ink);font-family:'Jura',sans-serif;min-height:100vh;}
  .wrap{max-width:1180px;margin:0 auto;padding:18px 16px 60px;}
  header.top{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:16px;}
  header.top h1{font-family:'Cinzel',serif;font-weight:700;font-size:26px;
    letter-spacing:.06em;margin:0;color:var(--gold);
    text-shadow:0 0 18px rgba(216,178,90,.25);}
  header.top .sub{color:var(--muted);font-size:13px;letter-spacing:.18em;
    text-transform:uppercase;}
  .layout{display:grid;grid-template-columns:700px 1fr;gap:22px;align-items:start;}
  @media(max-width:1080px){.layout{grid-template-columns:1fr;}
    .stage{margin:0 auto;}}
  .stage{position:relative;width:700px;height:700px;max-width:94vw;}
  @media(max-width:760px){.stage{width:94vw;height:94vw;}}
  canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;
    box-shadow:0 0 0 1px var(--line),0 20px 60px rgba(0,0,0,.6),
      inset 0 0 80px rgba(0,0,0,.5);cursor:crosshair;}
  .side{display:flex;flex-direction:column;gap:14px;}
  .card{background:linear-gradient(180deg,var(--panel),#120d1c);
    border:1px solid var(--line);border-radius:14px;padding:16px;}
  .card h2{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--gold);margin:0 0 10px;font-weight:500;}
  .cast{font-family:'Cinzel',serif;font-size:18px;color:var(--ink);
    min-height:24px;letter-spacing:.04em;}
  .cast.fire{color:#ff7a5c;text-shadow:0 0 16px rgba(255,90,60,.5);}
  .castbar{height:10px;background:#0c0814;border:1px solid var(--line);
    border-radius:6px;overflow:hidden;margin-top:8px;}
  .castbar > i{display:block;height:100%;width:0%;
    background:linear-gradient(90deg,#ff5c3c,#ffb13c);transition:width .12s linear;}
  .stepinfo{display:flex;justify-content:space-between;align-items:baseline;}
  .stepinfo .n{font-family:'Cinzel',serif;color:var(--gold);font-size:15px;}
  .stepinfo .t{color:var(--muted);font-size:12px;letter-spacing:.12em;
    text-transform:uppercase;}
  .prompt{font-size:15px;line-height:1.5;color:var(--ink);}
  .prompt b{color:var(--gold);}
  .me{display:flex;align-items:center;gap:10px;margin-top:4px;}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:5px 10px;
    border-radius:8px;font-weight:700;font-size:13px;letter-spacing:.05em;
    border:1px solid rgba(255,255,255,.14);}
  .chip .sq{width:16px;height:16px;border-radius:4px;}
  .dbf{padding:4px 9px;border-radius:7px;font-size:12px;font-weight:700;
    letter-spacing:.06em;border:1px solid rgba(255,255,255,.18);}
  .dbf.stack{background:rgba(110,174,84,.18);color:#a7e58a;}
  .dbf.spread{background:rgba(216,178,90,.16);color:#f0d28a;}
  .dbf.cone{background:rgba(196,68,68,.18);color:#f1a0a0;}
  .dbf.none{background:#1a1428;color:var(--muted);}
  .roles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .roleBtn{cursor:pointer;border:1px solid var(--line);border-radius:10px;
    padding:12px 6px;text-align:center;font-weight:700;font-size:15px;
    background:#140f20;color:var(--ink);transition:.15s;letter-spacing:.04em;}
  .roleBtn:hover{border-color:var(--gold);transform:translateY(-2px);}
  .roleBtn small{display:block;font-weight:400;font-size:10px;color:var(--muted);
    letter-spacing:.1em;margin-top:3px;text-transform:uppercase;}
  .roleBtn.tank{box-shadow:inset 0 -3px 0 var(--tankcol);}
  .roleBtn.heal{box-shadow:inset 0 -3px 0 var(--healcol);}
  .roleBtn.dps{box-shadow:inset 0 -3px 0 var(--dpscol);}
  .btn{cursor:pointer;border:none;border-radius:10px;padding:12px 16px;
    font-family:'Jura';font-weight:700;font-size:14px;letter-spacing:.08em;
    background:linear-gradient(180deg,#d8b25a,#b8923f);color:#1a1206;
    text-transform:uppercase;transition:.15s;}
  .btn:hover{filter:brightness(1.08);transform:translateY(-1px);}
  .btn.ghost{background:#1a1428;color:var(--ink);border:1px solid var(--line);}
  .btn.danger{background:linear-gradient(180deg,#c44,#922);color:#fff;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;flex-direction:column;gap:14px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%,rgba(10,5,15,.82),rgba(5,2,8,.95));
    text-align:center;padding:30px;}
  .overlay h3{font-family:'Cinzel',serif;font-size:30px;margin:0;letter-spacing:.05em;}
  .overlay.win h3{color:#a7e58a;text-shadow:0 0 24px rgba(120,220,120,.4);}
  .overlay.lose h3{color:#ff6a55;text-shadow:0 0 24px rgba(255,80,60,.4);}
  .overlay p{color:var(--ink);max-width:380px;line-height:1.55;margin:0;font-size:14px;}
  .progress{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
  .pdot{width:100%;flex:1;height:6px;border-radius:3px;background:#1c1530;min-width:8px;}
  .pdot.done{background:var(--green);}
  .pdot.cur{background:var(--gold);}
  .pdot.fail{background:var(--red);}
  .tiny{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
  .feedback{font-size:13px;min-height:18px;color:var(--muted);}
  .feedback.ok{color:#a7e58a;}
  .feedback.bad{color:#ff8a78;}
  .diffBtn{cursor:pointer;border:none;padding:8px 22px;font-family:'Jura';font-weight:700;
    font-size:13px;letter-spacing:.1em;text-transform:uppercase;background:#1a1428;
    color:var(--muted);transition:.15s;}
  .diffBtn.active{background:linear-gradient(180deg,#d8b25a,#b8923f);color:#1a1206;}
  .diffBtn:hover:not(.active){color:var(--ink);}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Forsaken</h1>
    <span class="sub">Dancing Mad (Ultimate) · ABBA Strat Sim</span>
  </header>

  <!-- Step / Cast bar — overlaid on the north edge of the arena -->

  <div class="layout">
    <div class="stage">
      <canvas id="cv" width="700" height="700"></canvas>
      <!-- Step/Cast overlay — sits on top of the arena's north side -->
      <div id="stepCard" style="
        position:absolute;top:0;left:0;right:0;
        background:linear-gradient(180deg,rgba(10,5,20,.92) 0%,rgba(10,5,20,.80) 85%,rgba(10,5,20,0) 100%);
        border-radius:50% 50% 0 0 / 12% 12% 0 0;
        padding:14px 22px 24px;
        z-index:6;
        pointer-events:none;
      ">
        <div class="stepinfo" style="pointer-events:none;">
          <span class="n" id="stepN">—</span>
          <span class="t" id="stepClock"></span>
        </div>
        <div class="cast" id="castText" style="margin-top:4px;">Awaiting role…</div>
        <div class="castbar" id="castBar" style="margin-top:6px;"><i id="castFill"></i></div>
        <div class="stepbar" id="stepbar" style="height:5px;background:rgba(12,8,20,.7);border:1px solid var(--line);border-radius:4px;overflow:hidden;margin-top:6px;display:none;"><i id="stepFill" style="display:block;height:100%;width:100%;background:linear-gradient(90deg,#5b7bd6,#9db8f0);transition:width .12s linear;"></i></div>
        <div class="progress" id="progress" style="margin-top:6px;"></div>
      </div>

      <div class="overlay" id="overlay">
        <h3 id="ovTitle">Choose your role</h3>
        <p id="diffDesc" style="font-size:13px;color:var(--muted);margin:0;min-height:1.4em;">The fight pauses at each step. Take your time to think.</p>
        <p id="ovText" style="display:none;max-width:380px;line-height:1.55;margin:0;font-size:14px;"></p>
        <div id="diffToggle" style="display:flex;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:0 auto;">
          <button id="diffEasy" class="diffBtn active" onclick="setDiff('easy')">Easy</button>
          <button id="diffHard" class="diffBtn"        onclick="setDiff('hard')">Hard</button>
        </div>
        <div class="roles" id="roleGrid" style="width:100%;max-width:430px;margin:0 auto;"></div>
      </div>
    </div>

    <div class="side">
      <div class="card" id="objectiveCard">
        <h2>Your Objective</h2>
        <div class="prompt" id="prompt">Select a role to begin.</div>
        <div class="me" id="meRow" style="margin-top:12px;display:none;">
          <span class="chip" id="meChip"><span class="sq"></span><span id="meName"></span></span>
          <span class="dbf none" id="meDbf">No debuff</span>
        </div>
        <div class="feedback" id="feedback" style="margin-top:10px;"></div>
        <div class="row" id="controls" style="margin-top:12px;display:none;">
          <button class="btn ghost" id="restartBtn">Restart</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
/* ============================================================
   DMU — Forsaken Trainer  (single-file, canvas)
   ============================================================ */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const SIZE = 700;
const arenaImg = new Image();
let arenaReady = false;
arenaImg.onload = ()=>{ arenaReady = true; draw(); };
arenaImg.src = ARENA_SRC;

/* ---- difficulty ---- */
let DIFFICULTY = 'easy'; // 'easy' | 'hard'
const DIFF_DESCS = {
  easy: 'The fight pauses at each step. Take your time to think.',
  hard: 'Real time - no pauses. When a tower resolves, the game freezes for a few seconds to see debuff resolutions and assignments.',
};
function setDiff(d){
  DIFFICULTY = d;
  document.getElementById('diffEasy').classList.toggle('active', d==='easy');
  document.getElementById('diffHard').classList.toggle('active', d==='hard');
  const dd=document.getElementById('diffDesc'); if(dd) dd.textContent=DIFF_DESCS[d];
  const oc=document.getElementById('objectiveCard');
  if(oc) oc.style.display = (d==='hard') ? 'none' : '';
}

/* ---- geometry (normalized 0..1 of the 700px arena) ---- */
const N = v => v*SIZE;
const POS = {
  LEFT_TOWER_IN_NORTH:    {x:0.3284,y:0.5920},
  LEFT_TOWER_IN_CENTER:   {x:0.3283,y:0.6485},
  LEFT_TOWER_IN_SOUTH:    {x:0.3297,y:0.7422},
  LEFT_TOWER_STACK_SOAK:  {x:0.3284,y:0.5314},
  LEFT_TOWER_CONE_BAIT_1: {x:0.3298,y:0.79},
  LEFT_TOWER_CONE_BAIT_2: {x:0.2009,y:0.6626},
  RIGHT_TOWER_IN_NORTH:   {x:0.6652,y:0.5934},
  RIGHT_TOWER_IN_SOUTH:   {x:0.6678,y:0.7422},
  RIGHT_TOWER_STACK_SOAK: {x:0.6663,y:0.5261},
  RIGHT_TOWER_CONE_BAIT:  {x:0.7939,y:0.6625},
  LEFT_CLONE_BAIT:        {x:0.3718,y:0.3896},
  RIGHT_CLONE_BAIT:       {x:0.6239,y:0.3881},
  PAST_END_BAIT:          {x:0.4993,y:0.7032},
  FUTURE_END_BAIT:        {x:0.4987,y:0.2771},
};
// Initial formation (Step 1) — buddy layout, north of center:
//   T1  T2     M1  M2
//        [center/boss]
//   H1  H2     R1  R2
const INITIAL_FORMATION = {
  T1:{x:0.39,y:0.43}, T2:{x:0.46,y:0.43}, M1:{x:0.54,y:0.43}, M2:{x:0.61,y:0.43},
  H1:{x:0.39,y:0.57}, H2:{x:0.46,y:0.57}, R1:{x:0.54,y:0.57}, R2:{x:0.61,y:0.57},
};

// tower centers (midpoint between the in-north/in-south spots)
const LEFT_TOWER  = {x:0.3290, y:(0.5670+0.7672)/2};
const RIGHT_TOWER = {x:0.6665, y:(0.5684+0.7672)/2};
const TOWER_R = 0.10;          // ~20% of width diameter
const HIT_OUTER = 0.232;       // boss hitbox outer radius (norm)
const HIT_INNER = 0.232*0.80;
const ARENA_R = 0.475;

const ROLES = ['T1','T2','H1','H2','M1','M2','R1','R2'];
const ROLE_KIND = {T1:'tank',T2:'tank',H1:'heal',H2:'heal',M1:'dps',M2:'dps',R1:'dps',R2:'dps'};
const ROLE_SUB  = {T1:'Tank',T2:'Tank',H1:'Healer',H2:'Healer',M1:'Melee',M2:'Melee',R1:'Ranged',R2:'Ranged'};
const ROLE_COL  = {tank:'#3c50ae',heal:'#3c672f',dps:'#743333'};
const isSupport = r => ROLE_KIND[r]!=='dps';
const isDPS     = r => ROLE_KIND[r]==='dps';
const isTank    = r => r==='T1'||r==='T2';
const isHealer  = r => r==='H1'||r==='H2';
const isMelee   = r => r==='M1'||r==='M2';
const isRanged  = r => r==='R1'||r==='R2';
const BUDDY = {T1:'H1',H1:'T1',T2:'H2',H2:'T2',M1:'R1',R1:'M1',M2:'R2',R2:'M2'};

/* ---- utility ---- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(a){return a[(Math.random()*a.length)|0];}

/* ============================================================
   GAME STATE
   ============================================================ */
let G = null;

function newGame(myRole){
  stopHardTimer();
  hideContinueBtn();
  attackContinueCb=null;
  if(G){ G.playerChoice=null; G.hardStepActive=false; }
  G = {
    myRole,
    step:0,
    debuffs:{},        // role -> 'stack'|'spread'|'cone'|null
    groupA:[], groupB:[],
    casts:[],          // per even-set: 'past'|'future' (index by even-set order)
    pendingCast:null,  // most recent past/future cast for next bait
    placements:{},     // role -> position key (current step solution)
    over:false, won:false,
    history:[],        // per-step result: 'done'|'fail'
    awaitClick:false,
    currentValidPositions:[], // keys clickable this step
    correctForMe:null,
    stepType:null,     // 'solve' | 'bait'
    setIndex:null,     // which tower set (1..8) this solve step refers to
    parity:null,       // 'odd'|'even'
    showAttacks:false,
  };
  initialAssign();
  buildSteps();
  startFormation();
}

/* STEP 1 — show initial formation with debuffs for 5 seconds, then begin */
function startFormation(){
  G.stepType='formation';
  G.awaitClick=false;
  G.showAttacks=false;
  G.cast='Forsaken'; // kept for reference but bar is hidden during formation
  G.placements={};
  for(const r of ROLES) G.placements[r]=null;
  G.formationActive=true;
  updateUI();
  draw();
  if(DIFFICULTY==='easy'){
    showContinueBtn(()=>{ G.formationActive=false; startStep(); });
  } else {
    // Hard: auto-advance after 5s
    setTimeout(()=>{ G.formationActive=false; startStep(); }, 5000);
  }
}

/* ---- initial debuff assignment + group formation ---- */
function initialAssign(){
  // 1 support stack, 1 dps stack; rest cone/spread, supports opposite of dps
  const supports = ['T1','T2','H1','H2'];
  const dps = ['M1','M2','R1','R2'];
  const sStack = pick(supports);
  const dStack = pick(dps);
  // supports get one type for the non-stack ones, dps get the opposite
  const supType = pick(['cone','spread']);
  const dpsType = supType==='cone'?'spread':'cone';
  const db = {};
  for(const r of supports) db[r] = (r===sStack)?'stack':supType;
  for(const r of dps)      db[r] = (r===dStack)?'stack':dpsType;
  G.debuffs = db;
  formGroups();
}

function formGroups(){
  // pairs: matched debuff => Group B, mismatched => Group A
  const pairs = [['T1','H1'],['T2','H2'],['M1','R1'],['M2','R2']];
  const A=[],B=[];
  for(const [a,b] of pairs){
    if(G.debuffs[a]===G.debuffs[b]) { B.push(a,b); } else { A.push(a,b); }
  }
  G.groupA=A; G.groupB=B;
}

/* group soaking a given set (1..8) : ABBA ABBA */
function soakingGroup(set){
  const A = new Set([1,4,5,8]);
  return A.has(set) ? G.groupA : G.groupB;
}


/* ============================================================
   PLACEMENT ENGINE — compute correct position for every role
   for a given tower set (solve step).
   ============================================================ */
function computeSolvePlacements(set){
  const parity=(set%2===1)?'odd':'even';
  const soak=soakingGroup(set);
  const soakSet=new Set(soak);
  const outside=ROLES.filter(r=>!soakSet.has(r));
  const place={};

  // Fixed in-tower slots per parity, each wanting a specific debuff.
  const slots = (parity==='odd')
    ? [['LEFT_TOWER_IN_CENTER','stack','L'],['LEFT_TOWER_IN_SOUTH','cone','L'],
       ['RIGHT_TOWER_IN_NORTH','stack','R'],['RIGHT_TOWER_IN_SOUTH','spread','R']]
    : [['LEFT_TOWER_IN_NORTH','cone','L'],['LEFT_TOWER_IN_SOUTH','spread','L'],
       ['RIGHT_TOWER_IN_NORTH','cone','R'],['RIGHT_TOWER_IN_SOUTH','spread','R']];

  // left-preference ranking: supports prefer Left, DPS prefer Right;
  // within a kind, Healer/Melee sit more-left than Tank/Ranged.
  const leftPref = r => {
    const base = isSupport(r)?0:2;
    const sub  = (isHealer(r)||isMelee(r))?0:1;
    return base+sub;
  };

  const debuffs = (parity==='odd') ? ['stack','cone','spread'] : ['cone','spread'];
  for(const d of debuffs){
    const wantSlots = slots.filter(s=>s[1]===d).slice();
    const players = soak.filter(r=>G.debuffs[r]===d).slice();
    players.sort((a,b)=>leftPref(a)-leftPref(b));      // left-preferring first
    wantSlots.sort((a,b)=>(a[2]==='L'?0:1)-(b[2]==='L'?0:1)); // Left slot first
    for(let k=0;k<players.length;k++) place[players[k]] = wantSlots[k][0];
  }

  // Outside group: fixed by role.
  const oTank = outside.find(isTank);
  const oHeal = outside.find(isHealer);
  const oMel  = outside.find(isMelee);
  const oRan  = outside.find(isRanged);
  if(parity==='odd'){
    place[oHeal]='LEFT_TOWER_CONE_BAIT_1';
    place[oTank]='LEFT_TOWER_STACK_SOAK';
    // RIGHT_TOWER_STACK_SOAK: 2 soaking-group DPS who have no in-tower slot yet
    const soakDpsUnplaced = soak.filter(r=>isDPS(r)&&!place[r]);
    soakDpsUnplaced.forEach(r=>{ place[r]='RIGHT_TOWER_STACK_SOAK'; });
    // outside DPS stand at RIGHT_TOWER_STACK_SOAK too (they soak the stack from outside)
    if(oMel) place[oMel]='RIGHT_TOWER_STACK_SOAK';
    if(oRan) place[oRan]='RIGHT_TOWER_STACK_SOAK';
  } else {
    place[oHeal]='LEFT_TOWER_CONE_BAIT_2';
    place[oRan]='RIGHT_TOWER_CONE_BAIT';
    place[oTank]='LEFT_CLONE_BAIT';
    place[oMel]='RIGHT_CLONE_BAIT';
  }
  return place;
}

/* bait step: everyone stacks on PAST or FUTURE bait spot */
function computeBaitPlacements(castType){
  const key = castType==='past' ? 'PAST_END_BAIT' : 'FUTURE_END_BAIT';
  const p={}; for(const r of ROLES) p[r]=key; return p;
}

/* ============================================================
   DEBUFF RE-ASSIGNMENT after a soak (random within counts)
   Only the 4 soakers get new debuffs.
   ============================================================ */
function reassignAfterSet(set){
  const soak = soakingGroup(set);
  const parity = (set%2===1)?'odd':'even';
  let pool;
  if(parity==='odd'){
    // 2 cone, 2 spread
    pool = shuffle(['cone','cone','spread','spread']);
  } else {
    // 2 stack, 1 cone, 1 spread
    pool = shuffle(['stack','stack','cone','spread']);
  }
  const order = shuffle(soak);
  order.forEach((r,i)=> G.debuffs[r]=pool[i]);
}

/* ============================================================
   STEP TIMELINE
   Build the ordered list of interactive steps.
   ============================================================ */
function buildSteps(){
  // Decide the random past/future casts up front (one per even-set transition
  // that precedes a bait). Bait happens before sets 3,5,7 and final.
  // We'll generate casts lazily as we go to keep randomness per playthrough.
  G.plan = [
    {kind:'solve', set:1},                 // STEP 2
    {kind:'solve', set:2},                 // STEP 3  (cast happens after -> stored)
    {kind:'bait',  forSet:3},              // STEP 4
    {kind:'solve', set:3},                 // STEP 5
    {kind:'solve', set:4},                 // STEP 6
    {kind:'bait',  forSet:5},              // STEP 7
    {kind:'solve', set:5},                 // STEP 8
    {kind:'solve', set:6},                 // STEP 9
    {kind:'bait',  forSet:7},              // STEP 10
    {kind:'solve', set:7},                 // STEP 11
    {kind:'solve', set:8},                 // STEP 12
    {kind:'bait',  final:true},            // STEP 13
    {kind:'dodge', final:true},            // STEP 14
  ];
  G.planIdx = 0;
}

/* generate a cast (past/future) when an even set ends */
function rollCast(){ return pick(['past','future']); }

/* ============================================================
   STEP DRIVER
   ============================================================ */
function startStep(){
  if(!G || G.over) return;
  const p = G.plan[G.planIdx];
  G.showAttacks=false;
  G.placements={};
  G.feedback='';

  if(p.kind==='solve'){
    G.stepType='solve';
    G.setIndex=p.set;
    G.parity=(p.set%2===1)?'odd':'even';
    // For even sets, roll the cast NOW so it displays during positioning
    if(p.set%2===0 && G.pendingCast===null){
      G.pendingCast = rollCast();
    }
    const place = computeSolvePlacements(p.set);
    G.correctPlacements = place;
    G.correctForMe = place[G.myRole];
    G.currentValidPositions = solvePositionsFor(G.parity);
    // Cast bar label: what Kefka is actually casting while towers are up
    // set 1 = Forsaken still resolving; even sets = Past's/Future's End;
    // odd sets ≥3 = All Things Ending (starts shortly after towers spawn)
    if(p.set===1){
      G.cast = ''; // Forsaken just ended — no active cast
    } else if(p.set%2===0){
      G.cast = (G.pendingCast==='past') ? "Past's End" : "Future's End";
    } else {
      G.cast = 'All Things Ending';
    }
  } else if(p.kind==='bait'){
    G.stepType='bait';
    G.castForBait = G.pendingCast;
    G.pendingCast = null; // consumed — next even set will roll fresh
    const place = computeBaitPlacements(G.castForBait);
    G.correctPlacements=place;
    G.correctForMe=place[G.myRole];
    G.currentValidPositions=['PAST_END_BAIT','FUTURE_END_BAIT'];
    G.cast = ''; // no cast active during bait positioning
  } else if(p.kind==='dodge'){
    G.stepType='dodge';
    // opposite of the previous bait
    const opp = (G.castForBait==='past')?'future':'past';
    const place = computeBaitPlacements(opp);
    G.correctPlacements=place;
    G.correctForMe=place[G.myRole];
    G.currentValidPositions=['PAST_END_BAIT','FUTURE_END_BAIT'];
    G.cast='All Things Ending — DODGE!';
  }
  G.awaitClick=true;
  if(DIFFICULTY==='hard'){
    startHardTimer(); // also drives the step bar with timeout
  } else {
    animateStepBar(0); // easy: just show bar full, no countdown
  }
  startCastBar(); // always drive cast bar from timeline, independent of clicks
  updateUI();
  draw();
}

/* ---- Hard mode countdown ---- */
// Per-step durations for Hard mode (milliseconds), derived from the timeline.
// Index matches G.plan order: [set1, set2, bait-for-3, set3, set4,
//   bait-for-5, set5, set6, bait-for-7, set7, set8, bait-final, dodge-final]
const HARD_STEP_DURATIONS = [6000, 10027, 5000, 11006, 9988, 6380, 11018, 10031, 6323, 11014, 10034, 7919, 5221];

function startHardTimer(){
  stopHardTimer();
  G.hardStepActive = true;
  const stepMs = HARD_STEP_DURATIONS[G.planIdx] || 8000;
  animateStepBar(stepMs, true); // true = fire resolveHardStep when bar expires
}

function stopHardTimer(){
  if(G) G.hardStepActive=false;
  if(stepbarEl){ stepbarEl.style.display='none'; }
  if(stepFillEl){ stepFillEl.style.width='100%'; }
}

function solvePositionsFor(parity){
  if(parity==='odd'){
    return ['LEFT_TOWER_IN_CENTER','LEFT_TOWER_IN_SOUTH','RIGHT_TOWER_IN_NORTH',
      'RIGHT_TOWER_IN_SOUTH','LEFT_TOWER_STACK_SOAK','LEFT_TOWER_CONE_BAIT_1',
      'RIGHT_TOWER_STACK_SOAK'];
  } else {
    return ['LEFT_TOWER_IN_NORTH','LEFT_TOWER_IN_SOUTH','RIGHT_TOWER_IN_NORTH',
      'RIGHT_TOWER_IN_SOUTH','LEFT_TOWER_CONE_BAIT_2','RIGHT_TOWER_CONE_BAIT',
      'LEFT_CLONE_BAIT','RIGHT_CLONE_BAIT'];
  }
}

/* handle a click on a position */
function choosePosition(key){
  if(!G || G.over || !G.awaitClick) return;

  const correct = (key===G.correctForMe);
  // place me where I clicked, everyone else correct
  G.placements = Object.assign({}, G.correctPlacements);
  G.placements[G.myRole]=key;
  if(DIFFICULTY==='easy'){
    // Easy: resolve immediately on click
    G.awaitClick=false;
    stopHardTimer();
    if(!correct){
      G.history.push('fail');
      showAttacksThen(()=>{ gameOver(false, key); });
      return;
    }
    G.history.push('done');
    showAttacksThen(()=>{ advance(); });
  } else {
    // Hard: silently record choice, let the bar run to zero naturally
    if(G.playerChoice) return; // already chose this step, ignore re-clicks
    G.playerChoice = {key, correct};
    G.awaitClick=false; // stop further clicks but keep timer running
    updateUI(); draw();
  }
}

function resolveHardStep(timedOut){
  stopHardTimer(); // also clears G.hardStepActive
  if(timedOut || !G.playerChoice){
    // No click or timed out = wipe
    G.history.push('fail');
    G.badKey = timedOut ? '(timeout)' : '(no selection)';
    G.correctForMe = G.correctForMe || '?';
    showAttacksThen(()=>{ gameOver(false, G.badKey); });
    return;
  }
  const {key, correct} = G.playerChoice;
  G.playerChoice = null;
  if(!correct){
    G.history.push('fail');
    showAttacksThen(()=>{ gameOver(false, key); });
    return;
  }
  G.history.push('done');
  showAttacksThen(()=>{ advance(); });
}

let attackContinueCb=null;
function showAttacksThen(cb){
  const p=G.plan[G.planIdx];
  if(p && p.kind==='solve'){
    // Snapshot the debuffs AS THEY ARE RIGHT NOW — these are what triggered
    G.debuffsAtResolve = Object.assign({}, G.debuffs);
    // Set 7 is Group B's 4th soak, set 8 is Group A's 4th soak — no new debuffs
    const isFinalSoak = (p.set === 7 || p.set === 8);
    if(!isFinalSoak){
      reassignAfterSet(p.set);
      G.soakersThisSet = new Set(soakingGroup(p.set));
    } else {
      // No reassignment — don't show new debuff icons on anyone
      G.soakersThisSet = null;
    }
  } else {
    G.debuffsAtResolve = null;
    G.soakersThisSet   = null;
  }
  G.showAttacks=true;
  G.awaitClick=false;
  attackContinueCb=cb;
  if(DIFFICULTY==='easy'){
    showContinueBtn();
  } else {
    // Hard: no freeze on bait/dodge steps; 2s freeze on solve steps
    const freeze = (p && p.kind==='solve') ? 2000 : 0;
    updateUI(); draw();
    setTimeout(()=>{
      G.showAttacks=false;
      const c=attackContinueCb; attackContinueCb=null; c&&c();
    }, freeze);
    return; // skip the updateUI/draw below (already called)
  }
  updateUI();
  draw();
}

function showContinueBtn(directCb){
  let btn=document.getElementById('continueBtn');
  if(!btn){
    btn=document.createElement('button');
    btn.id='continueBtn';
    btn.className='btn';
    btn.textContent='Continue';
    btn.style.cssText='position:absolute;bottom:22px;left:50%;transform:translateX(-50%);z-index:10;letter-spacing:.12em;';
    document.querySelector('.stage').appendChild(btn);
  }
  btn.style.display='block';
  btn.onclick=()=>{
    btn.style.display='none';
    G.showAttacks=false;
    if(directCb){
      directCb();
    } else {
      const cb=attackContinueCb;
      attackContinueCb=null;
      cb&&cb();
    }
  };
}

function hideContinueBtn(){
  const btn=document.getElementById('continueBtn');
  if(btn) btn.style.display='none';
}

function advance(){
  G.planIdx++;
  if(G.planIdx>=G.plan.length){ gameOver(true); return; }
  startStep();
}

function gameOver(won, badKey){
  stopHardTimer();
  hideContinueBtn();
  G.over=true; G.won=won; G.badKey=badKey||null;
  updateUI(); draw();
  showOverlayResult();
}

/* ============================================================
   RENDERING
   ============================================================ */
function ax(nx){return nx*SIZE;}
function ay(ny){return ny*SIZE;}

function draw(){
  ctx.clearRect(0,0,SIZE,SIZE);
  if(arenaReady) ctx.drawImage(arenaImg,0,0,SIZE,SIZE);
  else { ctx.fillStyle='#100b1a'; ctx.fillRect(0,0,SIZE,SIZE); }

  if(!G) return;

  // STEP 1: formation — draw all players in buddy layout with debuffs, nothing else
  if(G.formationActive){
    drawFormation();
    return;
  }

  // during selection: show towers (if solve), bait spots, clickable positions, NO players
  // during attack window: show players + attacks + debuff icons
  const showSpots = G.awaitClick;
  const showPlayers = !G.awaitClick;

  // towers visible during solve steps (select + attack window)
  if(G.stepType==='solve'){ drawTower(LEFT_TOWER); drawTower(RIGHT_TOWER); }

  // bait/dodge: show both bait spots subtly + party target
  if(G.stepType==='bait'||G.stepType==='dodge'){
    drawBaitZone(POS.PAST_END_BAIT, "Past");
    drawBaitZone(POS.FUTURE_END_BAIT, "Future");
  }

  if(showSpots){
    for(const key of G.currentValidPositions){
      drawSpot(key);
    }
  }

  if(G.showAttacks){
    drawAttacks();
  }

  if(showPlayers){
    drawPlayers();
  }
}

function drawTower(t){
  ctx.save();
  ctx.beginPath();
  ctx.arc(ax(t.x),ay(t.y),N(TOWER_R),0,Math.PI*2);
  const grd=ctx.createRadialGradient(ax(t.x),ay(t.y),N(TOWER_R)*.3,ax(t.x),ay(t.y),N(TOWER_R));
  grd.addColorStop(0,'rgba(95,208,232,.06)');
  grd.addColorStop(1,'rgba(95,208,232,.22)');
  ctx.fillStyle=grd; ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle='rgba(120,225,245,.9)';
  ctx.shadowColor='rgba(95,208,232,.8)'; ctx.shadowBlur=14; ctx.stroke();
  ctx.restore();
}

function drawBaitZone(p,label){
  ctx.save();
  ctx.beginPath();
  ctx.arc(ax(p.x),ay(p.y),22,0,Math.PI*2);
  ctx.strokeStyle='rgba(216,178,90,.35)';
  ctx.setLineDash([5,5]); ctx.lineWidth=2; ctx.stroke();
  ctx.restore();
}

function drawSpot(key){
  const p=POS[key];
  const me = (key===G.correctForMe);
  ctx.save();
  ctx.beginPath();
  ctx.arc(ax(p.x),ay(p.y),16,0,Math.PI*2);
  ctx.fillStyle = 'rgba(216,178,90,.16)';
  ctx.fill();
  ctx.lineWidth=2.5;
  ctx.strokeStyle='rgba(232,200,110,.95)';
  ctx.shadowColor='rgba(216,178,90,.7)'; ctx.shadowBlur=10;
  ctx.stroke();
  ctx.restore();
  // pulsing inner dot
  ctx.save();
  ctx.beginPath();
  ctx.arc(ax(p.x),ay(p.y),5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,235,180,.95)'; ctx.fill();
  ctx.restore();
}

function roleColorOf(r){ return ROLE_COL[ROLE_KIND[r]]; }

function drawFormation(){
  // each player at their fixed formation coordinate, with debuff icon above
  for(const r of ROLES){
    const p = INITIAL_FORMATION[r];
    drawPlayer(ax(p.x), ay(p.y), r);
  }
}

function drawPlayers(){
  // group players by position so stacked ones (e.g. RIGHT_TOWER_STACK_SOAK x2,
  // bait spots x8) fan out
  const byPos={};
  for(const r of ROLES){
    const k=G.placements[r]; if(!k) continue;
    (byPos[k]=byPos[k]||[]).push(r);
  }
  for(const k in byPos){
    const list=byPos[k]; const p=POS[k];
    const n=list.length;
    list.forEach((r,i)=>{
      let ox=0,oy=0;
      if(n>1){
        if(n<=4){
          // side-by-side horizontally: centre the row
          const spacing = (k==='RIGHT_TOWER_STACK_SOAK') ? 28 : 18;
          ox=(i-(n-1)/2)*spacing;
        } else {
          const ang=(i/n)*Math.PI*2 - Math.PI/2;
          ox=Math.cos(ang)*24; oy=Math.sin(ang)*24;
        }
      }
      drawPlayer(ax(p.x)+ox, ay(p.y)+oy, r);
    });
  }
}

function drawPlayer(x,y,r){
  const isMe = (r===G.myRole);
  const col = roleColorOf(r);
  const s=isMe?30:26;
  ctx.save();
  // glow for me
  if(isMe){ ctx.shadowColor=col; ctx.shadowBlur=18; }
  roundRect(x-s/2,y-s/2,s,s,7);
  ctx.fillStyle=col; ctx.fill();
  ctx.lineWidth=isMe?3:1.5;
  ctx.strokeStyle=isMe?'#ffe9a8':'rgba(255,255,255,.5)';
  ctx.shadowBlur=0; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font=`700 ${isMe?14:12}px Jura, sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(r,x,y+1);
  ctx.restore();
  // debuff icon above
  if(G.formationActive){
    // formation: show everyone's starting debuff
    const d=G.debuffs[r];
    if(d) drawDebuffIcon(x,y-s/2-14,d);
  } else if(G.showAttacks && G.soakersThisSet){
    // after tower resolve: show NEW debuff only for players who soaked
    if(G.soakersThisSet.has(r)){
      const d=G.debuffs[r]; // already reassigned = new debuff
      if(d) drawDebuffIcon(x,y-s/2-14,d);
    }
  }
}

function roundRect(x,y,w,h,rad){
  ctx.beginPath();
  ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad);
  ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad);
  ctx.arcTo(x,y,x+w,y,rad);
  ctx.closePath();
}

function drawDebuffIcon(x,y,d){
  const img = DEBUFF_IMG[d];
  if(!img || !img.complete || !img.naturalWidth) return;
  const S = 26;
  ctx.save();
  // 'screen' blend: black pixels vanish, colored pixels show through — perfect for
  // icons designed on a black background
  ctx.globalCompositeOperation = 'screen';
  ctx.drawImage(img, x - S/2, y - S/2, S, S);
  ctx.restore();
}

/* draw the attacks resolving (stacks, spreads, cones, clone aoes) */
function drawAttacks(){
  const place=G.placements;
  // Only players INSIDE towers trigger their debuffs — the soaking group
  const soakers = G.stepType==='solve' ? new Set(soakingGroup(G.setIndex)) : new Set();

  // Build a lookup: position key -> pixel coords, for finding cone targets
  // Cone targets by parity:
  //   odd:  cone player in LEFT_TOWER_IN_SOUTH  -> bait at LEFT_TOWER_CONE_BAIT_1
  //   even: cone player in LEFT_TOWER_IN_NORTH  -> bait at LEFT_TOWER_CONE_BAIT_2
  //         cone player in RIGHT_TOWER_IN_NORTH -> bait at RIGHT_TOWER_CONE_BAIT
  const coneTargetFor = {
    LEFT_TOWER_IN_SOUTH:  'LEFT_TOWER_CONE_BAIT_1',
    LEFT_TOWER_IN_NORTH:  'LEFT_TOWER_CONE_BAIT_2',
    RIGHT_TOWER_IN_NORTH: 'RIGHT_TOWER_CONE_BAIT',
  };

  for(const r of ROLES){
    const k=place[r]; if(!k) continue;
    // Use the snapshotted pre-resolve debuffs for drawing attacks
    const d=(G.debuffsAtResolve||G.debuffs)[r];
    const p=POS[k];
    const x=ax(p.x), y=ay(p.y);
    if(G.stepType==='solve' && soakers.has(r)){
      if(d==='stack') drawCircleAtk(x,y,N(0.105),'rgba(111,174,84,.30)','#7fd05a');
      else if(d==='spread') drawCircleAtk(x,y,N(0.12),'rgba(160,80,220,.25)','#c07de8');
      else if(d==='cone'){
        const targetKey = coneTargetFor[k];
        const tp = targetKey ? POS[targetKey] : null;
        drawConeAtk(x, y, tp ? ax(tp.x) : null, tp ? ay(tp.y) : null);
      }
    }
  }
  // clone bait aoes on even sets — shown on all 4 clone baiters:
  // the outside tank/melee (LEFT/RIGHT_CLONE_BAIT) AND the cone players in the towers (IN_NORTH)
  if(G.stepType==='solve' && G.parity==='even'){
    const cloneBaitPositions = new Set([
      'LEFT_CLONE_BAIT','RIGHT_CLONE_BAIT',
      'LEFT_TOWER_IN_NORTH','RIGHT_TOWER_IN_NORTH',
    ]);
    for(const r of ROLES){
      const k=place[r];
      if(cloneBaitPositions.has(k)){
        const p=POS[k];
        drawCircleAtk(ax(p.x),ay(p.y),N(0.075),'rgba(255,140,0,.22)','#ff9a20');
      }
    }
  }
  if(G.stepType==='dodge'){
    // big clone slashes through opposite bait spot
    drawCloneSlash();
  }
}

function drawCircleAtk(x,y,r,fill,stroke){
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=fill; ctx.fill();
  ctx.lineWidth=2.5; ctx.strokeStyle=stroke;
  ctx.shadowColor=stroke; ctx.shadowBlur=12; ctx.stroke();
  ctx.restore();
}

function drawConeAtk(x, y, tx, ty){
  // Aim toward the bait player; fall back to arena centre if no target known
  const targetX = (tx != null) ? tx : SIZE/2;
  const targetY = (ty != null) ? ty : SIZE/2;
  const ang  = Math.atan2(targetY - y, targetX - x);
  const half = Math.PI/4; // 90°
  const len  = N(0.34);
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.arc(x,y,len,ang-half,ang+half);
  ctx.closePath();
  ctx.fillStyle='rgba(196,68,68,.22)';
  ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle='rgba(240,120,120,.9)';
  ctx.shadowColor='rgba(240,80,80,.7)'; ctx.shadowBlur=10; ctx.stroke();
  ctx.restore();
}

function drawCloneSlash(){
  // show a big slash across whichever bait spot is WRONG (the one party left)
  const leftKey = (G.castForBait==='past')?'PAST_END_BAIT':'FUTURE_END_BAIT';
  const p=POS[leftKey];
  ctx.save();
  ctx.translate(ax(p.x),ay(p.y));
  ctx.fillStyle='rgba(200,60,230,.18)';
  ctx.fillRect(-SIZE,-30,SIZE*2,60);
  ctx.restore();
}

const stepClockEl=document.getElementById('stepClock');

const castFillEl=document.getElementById('castFill');

const meRow=document.getElementById('meRow');
const meChip=document.getElementById('meChip');

function updateUI(){

  const formation = (G.stepType==='formation');

  {
    const d0=document.createElement('div'); d0.className='pdot';

  if(G.awaitClick){
    promptEl.innerHTML = promptFor();

    feedbackEl.className='feedback';
  } else if(formation){
    promptEl.innerHTML = promptFor();
    feedbackEl.textContent='Read your debuff and find your buddy…';
    feedbackEl.className='feedback';
  } else if(G.showAttacks){
    feedbackEl.textContent='Resolving…';
    feedbackEl.className='feedback ok';
  }
  controlsEl.style.display='flex';

}

function promptFor(){
  if(G.stepType==='formation'){
    const buddy = BUDDY[G.myRole];
    return `<b>Initial formation.</b> Note your debuff above your head and your buddy <b>${buddy}</b>. The mechanic begins in a moment…`;
  }
  if(G.stepType==='solve'){
    const setN=G.setIndex;
    const grp = soakingGroup(setN)===G.groupA?'A':'B';
    const inGroup = soakingGroup(setN).includes(G.myRole);
    const role = inGroup?'<b>soaking</b>':'<b>outside</b>';
    return `Tower set <b>${setN}</b> (${G.parity}). Group <b>${grp}</b> soaks. `+
      `You are in the ${role} group — pick your correct spot for your role &amp; debuff.`;
  }
  if(G.stepType==='bait'){
    const castName = G.castForBait==='past' ? "Past's End" : "Future's End";
    return `Clones are out. The cast was <b>${castName}</b>. `+
      `Stack with the party on the matching bait spot.`;
  }
  if(G.stepType==='dodge'){
    return `Final clone attack! Move to the <b>opposite</b> bait spot to dodge the slash.`;
  }
  return '';
}

// Per-plan-index cast data: {name, offsetMs, durationMs}
// Only steps where a cast is actually active during the player window.
const PLAN_CASTS = {
  1:  { offsetMs: 2316, durationMs: 6375 }, // set2: Past's/Future's End
  3:  { offsetMs: 0,    durationMs: 9124 }, // set3: All Things Ending
  4:  { offsetMs: 2227, durationMs: 6377 }, // set4: Past's/Future's End
  7:  { offsetMs: 2178, durationMs: 6381 }, // set6: Past's/Future's End
  10: { offsetMs: 2275, durationMs: 6381 }, // set8: Past's/Future's End
};

let castRAF=null;
const castBarEl=document.getElementById('castBar');
const stepbarEl=document.getElementById('stepbar');
const stepFillEl=document.getElementById('stepFill');

function startCastBar(){
  cancelAnimationFrame(castRAF); castRAF=null;
  castBarEl.style.visibility='hidden';
  castFillEl.style.width='0%';
  castTextEl.textContent='';
  castTextEl.className='cast';
  const info = PLAN_CASTS[G.planIdx];
  if(!info) return;
  const castName = G.cast || '';
  if(!castName) return;
  const fire = /Ending/.test(castName);
  const t0 = performance.now();
  // Track how much time was paused (during showAttacks freeze)
  let pausedMs = 0, pauseStart = 0;
  function tick(t){
    if(!G||G.over){ castBarEl.style.visibility='hidden'; castTextEl.textContent=''; return; }
    // Pause cast bar while attacks are showing
    if(G.showAttacks){
      if(!pauseStart) pauseStart = t;
      castRAF = requestAnimationFrame(tick);
      return;
    }
    if(pauseStart){ pausedMs += t - pauseStart; pauseStart = 0; }
    const elapsed = (t - t0) - pausedMs;
    if(elapsed < info.offsetMs){
      castRAF = requestAnimationFrame(tick);
      return;
    }
    const into = elapsed - info.offsetMs;
    const rem = Math.max(0, info.durationMs - into);
    if(rem <= 0){
      castBarEl.style.visibility='hidden';
      castTextEl.textContent='';
      return;
    }
    castFillEl.style.width = ((into / info.durationMs)*100)+'%';
    castTextEl.textContent = castName;
    castTextEl.className = 'cast'+(fire?' fire':'');
    castBarEl.style.visibility='visible';
    castRAF = requestAnimationFrame(tick);
  }
  castRAF = requestAnimationFrame(tick);
}

function animateStepBar(durationMs, fireTimeout){
  if(!stepbarEl||!stepFillEl) return;
  stepbarEl.style.display='block';
  stepFillEl.style.width='100%';
  if(!durationMs){ return; }
  const t0=performance.now();
  function tick(t){
    if(!G||G.over){ stepbarEl.style.display='none'; return; }
    const rem=Math.max(0,(t0+durationMs)-t);
    stepFillEl.style.width=(rem/durationMs*100)+'%';
    if(rem>0){
      requestAnimationFrame(tick);
    } else {
      stepbarEl.style.display='none';
      if(fireTimeout && G.hardStepActive){
        G.awaitClick=false;
        // If player already clicked, treat as normal resolution not a timeout
        resolveHardStep(!G.playerChoice);
      }
    }
  }
  requestAnimationFrame(tick);
}


/* ---- click handling on canvas ---- */
cv.addEventListener('click',(e)=>{
  if(!G || !G.awaitClick) return;
  const rect=cv.getBoundingClientRect();
  const x=(e.clientX-rect.left)/rect.width*SIZE;
  const y=(e.clientY-rect.top)/rect.height*SIZE;
  // find nearest valid position within radius
  let best=null,bd=1e9;
  for(const key of G.currentValidPositions){
    const p=POS[key];
    const dx=ax(p.x)-x, dy=ay(p.y)-y;
    const dd=dx*dx+dy*dy;
    if(dd<bd){bd=dd;best=key;}
  }
  if(best && Math.sqrt(bd) < 40){
    choosePosition(best);
  }
});
cv.addEventListener('mousemove',(e)=>{
  if(!G||!G.awaitClick){cv.style.cursor='default';return;}
  const rect=cv.getBoundingClientRect();
  const x=(e.clientX-rect.left)/rect.width*SIZE;
  const y=(e.clientY-rect.top)/rect.height*SIZE;
  let hit=false;
  for(const key of G.currentValidPositions){
    const p=POS[key]; const dx=ax(p.x)-x,dy=ay(p.y)-y;
    if(dx*dx+dy*dy<40*40){hit=true;break;}
  }
  cv.style.cursor=hit?'pointer':'crosshair';
});

/* ---- overlays ---- */
const overlay=document.getElementById('overlay');
const ovTitle=document.getElementById('ovTitle');
const ovText=document.getElementById('ovText');
const roleGrid=document.getElementById('roleGrid');

function buildRoleGrid(){
  roleGrid.innerHTML='';
  for(const r of ROLES){
    const b=document.createElement('div');
    b.className='roleBtn '+ROLE_KIND[r];
    b.innerHTML=`${r}<small>${ROLE_SUB[r]}</small>`;
    b.onclick=()=>{ hideOverlay(); newGame(r); };
    roleGrid.appendChild(b);
  }
}
function hideOverlay(){
  overlay.style.display='none';
  const dt=document.getElementById('diffToggle');
  if(dt) dt.style.display='none';
}
function showOverlayResult(){
  overlay.style.display='flex';
  overlay.className='overlay '+(G.won?'win':'lose');
  roleGrid.innerHTML='';
  const _dd=document.getElementById('diffDesc'); if(_dd) _dd.style.display='none';
  const _ot=document.getElementById('ovText');   if(_ot) _ot.style.display='block';
  if(G.won){
    ovTitle.textContent='Forsaken Resolved';
    ovText.innerHTML=`All 14 steps cleared as <b>${G.myRole}</b>. Clean run.`;
  } else {
    ovTitle.textContent='Wipe';
    const want = G.correctForMe;
    const stepNum = G.planIdx+2;
    if(G.badKey==='(timeout)'||G.badKey==='(no selection)'){
      ovText.innerHTML=`You didn't select a position in time on step <b>${stepNum}</b>.<br>`+
        `Correct spot was <b>${pretty(want)}</b>.`;
    } else {
      ovText.innerHTML=`You went to <b>${pretty(G.badKey)}</b> on step <b>${stepNum}</b>.<br>`+
        `Correct spot was <b>${pretty(want)}</b>.`;
    }
  }
  const again=document.createElement('button');
  again.className='btn'; again.textContent='Choose role';
  again.style.cssText='margin-top:6px;';
  again.onclick=()=>{ again.remove(); overlay.className='overlay'; ovTitle.textContent='Choose your role';
    const dt=document.getElementById('diffToggle'); if(dt) dt.style.display='flex';
    const _dd2=document.getElementById('diffDesc'); if(_dd2){ _dd2.style.display='block'; _dd2.textContent=DIFF_DESCS[DIFFICULTY]; }
    const _ot2=document.getElementById('ovText'); if(_ot2) _ot2.style.display='none';
    buildRoleGrid(); };
  overlay.appendChild(again);
}
function pretty(k){ return k? k.replace(/_/g,' ').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()):'—'; }

document.getElementById('restartBtn').onclick=()=>{
  overlay.style.display='flex'; overlay.className='overlay';
  ovTitle.textContent='Choose your role';
  const dt=document.getElementById('diffToggle'); if(dt) dt.style.display='flex';
  const _dd3=document.getElementById('diffDesc'); if(_dd3){ _dd3.style.display='block'; _dd3.textContent=DIFF_DESCS[DIFFICULTY]; }
  const _ot3=document.getElementById('ovText'); if(_ot3) _ot3.style.display='none';
  buildRoleGrid();
};

buildRoleGrid();
if(castBarEl) castBarEl.style.visibility='hidden';
if(castTextEl){ castTextEl.textContent='Awaiting role…'; castTextEl.className='cast'; }
draw();
</script>
